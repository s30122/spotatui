name: TOC Generator

on:
  push:
    branches:
      - main
    paths:
      - "README.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generateTOC:
    name: Generate TOC
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: technote-space/toc-generator@v4
        with:
          # The "Protect main" ruleset forbids direct pushes to main, so the
          # generator opens a PR with the TOC update instead of committing.
          # NOTE: with the default GITHUB_TOKEN the PR's CI (on: pull_request)
          # will NOT run, so the required status checks stay pending and the PR
          # must be merged by a bypass actor (repo admin). To have CI run on the
          # TOC PR and merge normally, create a PAT with `repo` scope, store it
          # as the ACCESS_TOKEN secret, and swap the line below to:
          #   GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_PATHS: "README.md"
          TOC_TITLE: "## Table of Contents"
          FOLDING: false
          CREATE_PR: true
          PR_DEFAULT_BRANCH_PREFIX: "toc/"
          PR_DEFAULT_BRANCH_NAME: "update-readme-toc"
          PR_DEFAULT_BRANCH_TITLE: "docs: update README TOC"
